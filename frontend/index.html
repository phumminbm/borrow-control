<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#1a0a12" />

    <!-- iOS Home Screen -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Neo BR System" />

    <!-- Android / General -->
    <meta name="application-name" content="Neo BR System" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!--
      maximum-scale=1.0 + user-scalable=no prevents iOS Safari from auto-zooming
      the page when the user taps an <input> / <textarea> with font-size < 16px.
      The Mobile BR Return forms (search bar, remark textarea, cancel-reason
      textarea, 4-step quantity inputs) all use ~12-13px fonts, which would
      otherwise trigger the auto-zoom and leave the layout in a slightly
      enlarged state the user has to manually pinch out of.
      Tradeoff: users can no longer pinch-zoom the page. For a Sale-tool web
      app this is the standard mobile-web-app pattern and an accepted tradeoff.
    -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Neo BR System</title>

    <style>
      * {
        font-family: "IBM Plex Sans Thai", "IBM Plex Sans", -apple-system, sans-serif;
        box-sizing: border-box;
        -webkit-tap-highlight-color: transparent;
      }
      html, body {
        margin: 0; padding: 0;
        overscroll-behavior: none;
        -webkit-text-size-adjust: 100%;
      }
      /* ── Hide native scrollbars (still scrollable via touch / wheel) ── */
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; -ms-overflow-style: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
